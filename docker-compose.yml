services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - db_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/smartflow.db
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
